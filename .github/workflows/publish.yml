name: Publish to npm

# Publishes @codevelocitylabs/prototype-factory to the public npm registry on
# each GitHub Release, via npm Trusted Publishing (OIDC) — no NPM_TOKEN, no 2FA
# bypass. Provenance is generated automatically.
#
# One-time setup on npmjs.com (package -> Settings -> Trusted publishing):
#   Org/user: codevelocitylabs | Repo: prototype-factory
#   Workflow filename: publish.yml | Allowed action: npm publish
# The package must already exist on npm, so do the FIRST publish manually:
#   npm login && npm publish --access public   (enter your 2FA OTP)
#
# Bump the version in package.json before each release.

on:
  release:
    types: [published]

permissions:
  id-token: write   # mint the OIDC token npm verifies (trusted publishing)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm (trusted publishing requires npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Run tests
        run: bash tests/run-all.sh

      - name: Publish (public, OIDC trusted publishing)
        run: npm publish --access public
